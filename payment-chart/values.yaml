replicaCount: 1

app:
  name: payment-system

image:
  repository: payment-system
  tag: "2.0"
  pullPolicy: Never

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

config:
  datasourceUrl: jdbc:mysql://host.docker.internal:3306/doodleblue
  kafkaBootstrapServers: kafka:9092

secret:
  datasourceUsername: root
  datasourcePassword: abusayath
  jwtSecret: "your-secret"

persistence:
  claimName: payment-pvc
  size: 1Gi
  storageClass: hostpath
  reclaimPolicy: Retain
  hostPath: /run/desktop/mnt/host/c/k8s-data/payment-data

ingress:
  className: nginx
  host: payment.local