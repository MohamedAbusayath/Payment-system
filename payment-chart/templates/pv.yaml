apiVersion: v1
kind: PersistentVolume

metadata:
  name: payment-pv

spec:
  capacity:
    storage: {{ .Values.persistence.size }}

  accessModes:
    - ReadWriteOnce

  persistentVolumeReclaimPolicy: {{ .Values.persistence.reclaimPolicy }}

  hostPath:
    path: {{ .Values.persistence.hostPath | quote }}