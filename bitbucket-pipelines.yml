image: maven:3.9.11-eclipse-temurin-25

pipelines:
  default:
    - step:
        name: Build and Push Docker Image

        services:
          - docker

        caches:
          - maven

        script:
          - mvn clean install
          - docker build -t abusayath/payment-system:1.0 .
          - echo $DOCKER_PASSWORD | docker login -u $DOCKER_USERNAME --password-stdin
          - docker push abusayath/payment-system:1.0